<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jez Cortez | Link Card</title>
  <meta name="description" content="A personal profile page with links to socials and websites." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/png" sizes="48x48" href="assets/favicon-48x48.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="assets/favicon-16x16.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon.png" />
  <link rel="manifest" href="site.webmanifest" />
  <meta name="theme-color" content="#f7f3eb" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="bg-shape bg-shape-a" aria-hidden="true"></div>
  <div class="bg-shape bg-shape-b" aria-hidden="true"></div>

  <main class="page">
    <section class="profile-card" aria-label="Profile links">
      <header class="profile-header">
        <div id="avatar" class="avatar intro-item" style="--intro-i: 0;" aria-hidden="true">YN</div>
        <p id="handle" class="handle intro-item" style="--intro-i: 1;">@jezcortez</p>
        <h1 id="name" class="name intro-item" style="--intro-i: 2;">Jez Cortez</h1>
        <p id="bio" class="bio intro-item" style="--intro-i: 3;">Designer, developer, and Gamer. Find me here.</p>
      </header>

      <ul id="link-list" class="link-list" aria-label="Social and website links"></ul>

      <footer class="footer reveal">
      </footer>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
